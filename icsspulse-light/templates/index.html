<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ICSSPulse - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #111827; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="text-gray-200">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-white">ICSSPulse</h1>
            <p class="text-xl text-gray-400 mt-2">Secure the Core, Pulse with Confidence</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 max-w-6xl w-full">

            <!-- Modbus Card -->
            <a href="/modbus" class="bg-gray-800 p-8 rounded-xl border border-gray-700 hover:border-teal-500 hover:bg-gray-900 transition-all duration-300 group">
                <h2 class="text-2xl font-bold text-white mb-3">Modbus Controller</h2>
                <p class="text-gray-400 mb-4">Directly interact with ICS devices using the Modbus protocol.</p>
                <span class="font-semibold text-teal-400 group-hover:underline">Open Controller &rarr;</span>
            </a>

            <!-- OPC UA Card -->
            <a href="/opcua" class="bg-gray-800 p-8 rounded-xl border border-gray-700 hover:border-yellow-500 hover:bg-gray-900 transition-all duration-300 group">
                <h2 class="text-2xl font-bold text-white mb-3">OPC UA Controller</h2>
                <p class="text-gray-400 mb-4">Directly interact with OPC UA nodes.</p>
                <span class="font-semibold text-yellow-400 group-hover:underline">Open Controller &rarr;</span>
            </a>

        </div>
    </div>
</body>
</html>
