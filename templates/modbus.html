<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICSSPulse - Modbus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { background-color: #111827; font-family: 'Inter', sans-serif; }
    .fira-code { font-family: 'Fira Code', monospace; }
    input, select {
      background-color: #374151;
      border-color: #4b5563;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4ade80;
      box-shadow: 0 0 0 2px rgba(74,222,128,0.2);
    }
    label small { color: #9CA3AF; }
  </style>
</head>
<body class="text-gray-200">
<div class="container mx-auto p-4 md:p-8">
<div class="max-w-7xl mx-auto">

  <div class="flex items-center justify-between mb-6">
    <a href="/" class="text-teal-400 hover:text-teal-300 inline-block">&larr; Back to Menu</a>
    <a href="/report" class="text-pink-400 hover:text-pink-300 inline-block">Report Center &rarr;</a>
  </div>

  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-white">Modbus Controller</h1>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- ═══════════════  PARAMETERS  ═══════════════════════════════════ -->
    <div class="bg-gray-800 rounded-lg shadow-2xl p-6 border border-gray-700">
      <h2 class="text-xl font-semibold text-white mb-4 border-b border-gray-700 pb-2">Parameters</h2>

      <form method="post" id="modbus-form">
        <input type="hidden" name="protocol" value="modbus">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <!-- Action -->
          <div class="md:col-span-2">
            <label for="action" class="block mb-2 text-sm font-medium text-gray-300">Action</label>
            <select name="action" id="action"
                    class="w-full rounded-lg p-2.5 text-white" required
                    onchange="updateFunctions(); updateFieldVisibility(); updateHint();">
              <option value="read"             {% if values.get('action','read')=='read'             %}selected{% endif %}>Read</option>
              <option value="write"            {% if values.get('action')=='write'            %}selected{% endif %}>Write</option>
              <option value="enumerate"        {% if values.get('action')=='enumerate'        %}selected{% endif %}>Enumerate</option>
              <option value="scan_units"       {% if values.get('action')=='scan_units'       %}selected{% endif %}>Scan Unit IDs</option>
              <option value="scan_registers"   {% if values.get('action')=='scan_registers'   %}selected{% endif %}>Scan Register Range</option>
            </select>
          </div>

          <!-- Hint text -->
          <div class="md:col-span-2">
            <p class="text-xs text-green-500" id="hint_text"></p>
          </div>

          <!-- Function -->
          <div id="function-field" class="md:col-span-2">
            <label for="function" class="block mb-2 text-sm font-medium text-gray-300">Function</label>
            <select name="function" id="function"
                    class="w-full rounded-lg p-2.5 text-white"
                    data-selected="{{ values.get('function') }}" required></select>
          </div>

          <!-- Target -->
          <div class="md:col-span-2">
            <label for="target" class="block mb-2 text-sm font-medium text-gray-300">Target IP / Hostname</label>
            <input type="text" name="target" id="target"
                   class="w-full rounded-lg p-2.5 text-white" required
                   placeholder="e.g., 192.168.1.123"
                   value="{{ values.get('target', '') }}">
          </div>

          <!-- Port -->
          <div>
            <label for="port" class="block mb-2 text-sm font-medium text-gray-300">
              Port <small>(default 502)</small>
            </label>
            <input type="number" name="port" id="port"
                   class="w-full rounded-lg p-2.5 text-white" required
                   value="{{ values.get('port', '502') }}">
          </div>

          <!-- Unit ID -->
          <div id="unit-id-field">
            <label for="unit_id" class="block mb-2 text-sm font-medium text-gray-300">
              Unit ID <small>(slave device, 0–247)</small>
            </label>
            <input type="number" name="unit_id" id="unit_id"
                   class="w-full rounded-lg p-2.5 text-white" required
                   value="{{ values.get('unit_id', '1') }}">
          </div>

          <!-- Unit scan range -->
          <div id="unit-scan-start" style="display:none;">
            <label class="block mb-2 text-sm font-medium text-gray-300">
              Start Unit ID <small>(min 0)</small>
            </label>
            <input type="number" name="unit_start" id="unit_start"
                   class="w-full rounded-lg p-2.5 text-white"
                   value="{{ values.get('unit_start', '1') }}" min="0" max="247">
          </div>
          <div id="unit-scan-end" style="display:none;">
            <label class="block mb-2 text-sm font-medium text-gray-300">
              End Unit ID <small>(max 247)</small>
            </label>
            <input type="number" name="unit_end" id="unit_end"
                   class="w-full rounded-lg p-2.5 text-white"
                   value="{{ values.get('unit_end', '10') }}" min="0" max="247">
          </div>

          <!-- Address -->
          <div id="address-field">
            <label for="address" class="block mb-2 text-sm font-medium text-gray-300">
              Address <small>(register start)</small>
            </label>
            <input type="number" name="address" id="address"
                   class="w-full rounded-lg p-2.5 text-white"
                   placeholder="e.g., 0"
                   value="{{ values.get('address', '') }}">
          </div>

          <!-- Value (write only) -->
          <div id="value-field">
            <label for="value" class="block mb-2 text-sm font-medium text-gray-300">
              Value <small>(write target)</small>
            </label>
            <input type="number" name="value" id="value"
                   class="w-full rounded-lg p-2.5 text-white"
                   placeholder="e.g., 1"
                   value="{{ values.get('value', '') }}">
          </div>

          <!-- Count / Range Size -->
          <div id="count-field">
            <label for="count" id="count-label"
                   class="block mb-2 text-sm font-medium text-gray-300">Count</label>
            <input type="number" name="count" id="count"
                   class="w-full rounded-lg p-2.5 text-white"
                   value="{{ values.get('count', '1') }}">
          </div>

          <!-- Timeout -->
          <div>
            <label for="timeout" class="block mb-2 text-sm font-medium text-gray-300">Timeout (s)</label>
            <input type="number" name="timeout" id="timeout"
                   class="w-full rounded-lg p-2.5 text-white"
                   value="{{ values.get('timeout', '3') }}">
          </div>

        </div><!-- /grid -->

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 mt-6">
          <button type="submit"
                  class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-lg transition duration-300">
            Execute
          </button>
          <button type="button" id="add-btn"
                  class="bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 px-6 rounded-lg transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
                  disabled>
            Add to Report
          </button>
        </div>
        <p class="text-xs text-gray-500 mt-3">
          ⚠️ For authorised testing only. Writes to a live PLC can affect physical processes.
        </p>
      </form>
    </div><!-- /parameters -->

    <!-- ═══════════════  OUTPUT  ════════════════════════════════════════ -->
    <div class="bg-gray-800 rounded-lg shadow-2xl p-6 border border-gray-700">
      <h2 class="text-xl font-semibold text-white mb-4 border-b border-gray-700 pb-2">Output</h2>
      <div class="bg-black rounded-lg p-4 h-[36rem] overflow-y-auto">
        <pre id="modbus-output" class="text-sm whitespace-pre-wrap fira-code text-gray-300">{{ output | safe }}</pre>
      </div>
    </div>

  </div><!-- /page grid -->
</div>
</div>

<!-- ══════════════════════  JavaScript  ═══════════════════════════════════ -->
<script>
  const ALL_FUNCS   = ['coils', 'discrete_inputs', 'holding_registers', 'input_registers'];
  const WRITE_FUNCS = ['coils', 'holding_registers'];

  const HINTS = {
    read:           'Reads one or more values at the given address from the selected function area.',
    write:          'Writes a value to a single coil or holding register at the specified address.',
    enumerate:      'Reads all accessible values across the entire selected function area starting from address 0.',
    scan_units:     'Probes every Unit ID in the given range to discover active Modbus slave devices.',
    scan_registers: 'Sweeps a large address range in chunks to map out all accessible registers in the selected area.',
  };

  function updateFunctions() {
    const action   = document.getElementById('action').value;
    const opts     = (action === 'write') ? WRITE_FUNCS : ALL_FUNCS;
    const sel      = document.getElementById('function');
    const previous = sel.dataset.selected;

    sel.innerHTML = '';
    opts.forEach(o => {
      const el = document.createElement('option');
      el.value       = o;
      el.textContent = o.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
      sel.appendChild(el);
    });
    if (previous && opts.includes(previous)) sel.value = previous;
  }

  function updateHint() {
    const action = document.getElementById('action').value;
    document.getElementById('hint_text').textContent = HINTS[action] || '';
  }

  function updateFieldVisibility() {
    const action      = document.getElementById('action').value;
    const fnField     = document.getElementById('function-field');
    const unitField   = document.getElementById('unit-id-field');
    const addrField   = document.getElementById('address-field');
    const valField    = document.getElementById('value-field');
    const countWrap   = document.getElementById('count-field');
    const scanStart   = document.getElementById('unit-scan-start');
    const scanEnd     = document.getElementById('unit-scan-end');
    const countLabel  = document.getElementById('count-label');

    // Reset scan fields
    scanStart.style.display = 'none';
    scanEnd.style.display   = 'none';

    if (action === 'scan_units') {
      fnField.style.display   = 'none';
      unitField.style.display = 'none';
      addrField.style.display = 'none';
      valField.style.display  = 'none';
      countWrap.style.display = 'none';
      scanStart.style.display = 'block';
      scanEnd.style.display   = 'block';
      document.getElementById('function').removeAttribute('required');
      document.getElementById('unit_id').removeAttribute('required');
      document.getElementById('address').removeAttribute('required');

    } else if (action === 'scan_registers') {
      fnField.style.display   = 'block';
      unitField.style.display = 'block';
      addrField.style.display = 'block';
      valField.style.display  = 'none';
      countWrap.style.display = 'block';
      countLabel.textContent  = 'Range Size';
      document.getElementById('function').setAttribute('required', 'required');
      document.getElementById('unit_id').setAttribute('required', 'required');
      document.getElementById('address').setAttribute('required', 'required');

    } else {
      fnField.style.display   = 'block';
      unitField.style.display = 'block';
      addrField.style.display = 'block';
      countWrap.style.display = 'block';
      countLabel.textContent  = 'Count';
      valField.style.display  = (action === 'write') ? 'block' : 'none';
      document.getElementById('function').setAttribute('required', 'required');
      document.getElementById('unit_id').setAttribute('required', 'required');
      document.getElementById('address').setAttribute('required', 'required');
    }
  }

  // ── Add to Report ──────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    updateFunctions();
    updateFieldVisibility();
    updateHint();

    const addBtn = document.getElementById('add-btn');
    const outEl  = document.getElementById('modbus-output');

    addBtn.disabled = !(outEl && outEl.textContent.trim().length > 0);

    addBtn.addEventListener('click', async () => {
      const payload = {
        inputs: {
          protocol:   'modbus',
          action:     document.getElementById('action').value,
          function:   document.getElementById('function').value,
          target:     document.getElementById('target').value.trim(),
          port:       document.getElementById('port').value,
          unit_id:    document.getElementById('unit_id').value,
          address:    document.getElementById('address').value,
          count:      document.getElementById('count').value,
          value:      document.getElementById('value').value,
          timeout:    document.getElementById('timeout').value,
          unit_start: document.getElementById('unit_start')?.value ?? null,
          unit_end:   document.getElementById('unit_end')?.value   ?? null,
        },
        output: outEl ? outEl.textContent : ''
      };

      if (!payload.output.trim()) {
        alert('Run a Modbus action first so there is output to add.');
        return;
      }

      try {
        addBtn.disabled = true;
        const res  = await fetch('/add-modbus-to-report', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Failed to add to report');
        } else {
          const prev = addBtn.textContent;
          addBtn.textContent = 'Added!';
          setTimeout(() => addBtn.textContent = prev, 1200);
        }
      } catch (e) {
        alert(`Error: ${e.message}`);
      } finally {
        addBtn.disabled = false;
      }
    });
  });
</script>
</body>
</html>
